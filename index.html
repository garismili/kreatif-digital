<!DOCTYPE html>
<html>
<head>
  <title>MAHOTTAMA</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  
  

  <style>
    body { margin:0; font-family:Arial; background:#f5f6fa; }
    header { background:#2f3640; color:white; padding:15px; font-size:20px; }

    .container { padding:15px; }

    .filter-box {
      background:white;
      padding:15px;
      border-radius:10px;
      margin-bottom:10px;
    }

    .filter-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      gap:10px;
    }

    select, button, input {
      padding:6px;
      border-radius:5px;
      border:1px solid #ccc;
    }

    button { background:#0984e3; color:white; cursor:pointer; }

    #map {
      height:400px;
      border-radius:10px;
      margin-bottom:10px;
    }

    table {
      width:100%;
      border-collapse:collapse;
      font-size:13px;
      background:white;
    }

    th, td {
      border:1px solid #ddd;
      padding:6px;
    }

    th { background:#0984e3; color:white; }

    tr:hover { background:#f1f1f1; cursor:pointer; }

    .wa-btn{
      display:inline-block;
      padding:5px 10px;
      background:#25D366;
      color:white;
      border-radius:5px;
      text-decoration:none;
      font-size:12px;
      font-weight:bold;
    }

    .map-btn{
      display:inline-block;
      padding:5px 8px;
      background:#e67e22;
      color:white;
      border-radius:5px;
      text-decoration:none;
      font-size:12px;
      font-weight:bold;
      margin-left:4px;
    }

    .cek-icon{ font-size:16px; text-align:center; }

    .idsbr-badge{
      display:inline-block;
      padding:3px 8px;
      background:#6c5ce7;
      color:white;
      border-radius:12px;
      font-size:12px;
      font-weight:bold;
      min-width:30px;
      text-align:center;
    }

    /* ===== HANYA INI YANG DIUBAH ===== */
    .kesimpulan-highlight{
      background:#00b894;  /* warna baru */
      color:white;
      padding:3px 6px;
      border-radius:6px;
      font-weight:bold;
      display:inline-block;
    }
    .map-stats-wrapper{
  display:flex;
  gap:10px;
  align-items:stretch;
}

#map{
  flex:2;
  height:500px;
}

#statsPanel{
  flex:1;
  background:white;
  border-radius:10px;
  padding:10px;
  height:500px;
  overflow:auto;
}

.stat-box{
  background:#f1f2f6;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  font-size:14px;
}
#statsPanel {
  display: flex;
  flex-direction: column;
  height: 500px;
}

.chart-box {
  flex: 1;
}

.chart-box canvas {
  width: 100%;
  height: 100%;
}
.chart-control {
  display: flex;
  gap: 10px;
}

.chart-control div {
  flex: 1;
}

.chart-control select {
  width: 100%;
}

.chart-control small {
  font-size: 11px;
  color: #636e72;
}
  </style>
</head>

<body>

<header>📍 MAHOTTAMA</header>

<div class="container">

  <div class="filter-box">
    <div class="filter-grid">

      <input type="text" id="searchBox" placeholder="🔍 Cari nama..." />

      <select id="layerSelect" onchange="gantiLayer()">
        <option value="desa">Layer Desa</option>
        <option value="sls">Layer SLS</option>
        <option value="subsls">Layer Sub SLS</option>
      </select>

      <select id="usaha"><option value="all">Usaha</option></select>
      <select id="kreatif"><option value="all">Kreatif</option></select>
      <select id="visibilitas"><option value="all">Visibilitas</option></select>
      <select id="produksi"><option value="all">Produksi</option></select>
      <select id="distribusi"><option value="all">Distribusi</option></select>
      <select id="produk"><option value="all">Produk Final</option></select>
      <select id="sumber"><option value="all">Sumber</option></select>
      <select id="kesimpulan"><option value="all">Kesimpulan</option></select>
      <select id="cek"><option value="all">Cek</option></select>

    </div>

    <br>
    <button onclick="resetFilter()">Reset</button>
    Jumlah data: <b id="jumlah">0</b>
  </div>

  <div class="map-stats-wrapper">

  <div id="map"></div>

  <div id="statsPanel">
    <h3>📊 Statistik</h3>

    <div class="stat-box">
      <b>Total Data:</b>
      <div id="statTotal">0</div>
    </div>

    <div class="stat-box">
      <b>Usaha Terbanyak:</b>
      <div id="statUsaha">-</div>
    </div>

    <div class="stat-box">
      <b>Kesimpulan:</b>
      <div id="statKesimpulan">-</div>
    </div>

    <div class="stat-box">
      <b>Kreatif Dominan:</b>
      <div id="statKreatif">-</div>
    </div>

      <div class="stat-box">
      <b>Cek:</b>
      <div id="statCek">-</div>
    </div>
    <div class="stat-box">

  <b>📊 Pilih Grafik</b>

  <div class="chart-control">

    <div>
      <small>Variabel</small><br>
      <select id="chartSelector"></select>
    </div>

    <div>
      <small>Tipe</small><br>
      <select id="chartType">
        <option value="bar">Bar</option>
        <option value="pie">Pie</option>
        <option value="doughnut">Doughnut</option>
      </select>
    </div>

  </div>
</div>

    

    <div class="stat-box chart-box">
    <canvas id="chartUtama"></canvas>
    </div>
    </div>

</div>

  <table>
    <thead>
      <tr>
        <th>Nama</th>
        <th>Usaha</th>
        <th>KBLI</th>
        <th>Alamat</th>
        <th>WA</th>
        <th>Maps</th>

        <th>Kreatif</th>
        <th>Visibilitas</th>
        <th>Produksi</th>
        <th>Distribusi</th>
        <th>Produk</th>
        <th>Bangunan</th>
        <th>Input</th>
        <th>Person</th>
        <th>Cek</th>
        <th>IDSBR</th>
        <th>Media</th>
        <th>Kesimpulan</th>
      </tr>
    </thead>

    <tbody id="tabelData"></tbody>
  </table>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

var map = L.map('map').setView([-8.54,115.40], 12);
var usahaLayer = L.layerGroup().addTo(map);
var geoLayer;
let allData = [];
let filteredData = [];
let searchQuery = "";
let markerMap = {};
let chartUtama;
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const fieldMap = {
  usaha: "Usaha",
  kreatif: "Kreatif",
  visibilitas: "Visibilitas",
  produksi: "Produksi",
  distribusi: "Distribusi",
  produk: "Produk",
  sumber: "Sumber",
  kesimpulan: "Kesimpulan",
  cek: "Cek"
};

const norm = v => (v || "").toLowerCase().trim();

Papa.parse("https://docs.google.com/spreadsheets/d/e/2PACX-1vTdCuzkPmo5X2upjTiZmE7JN98H4-1RL0XmT2AotLnBMBmyDPDJ4iKxDjQ6wnrTxSaEJhdIq6ieRVRP/pub?gid=0&single=true&output=csv", {
  download: true,
  header: true,
  complete: function(results) {

    allData = results.data
      .filter(d => d.Nama && d.Lat && d.Long)
      .map(d => {
        Object.keys(d).forEach(k => d[k] = (d[k] || "").trim());
        return d;
      });

    filteredData = allData;

    isiDropdown(allData, fieldMap.usaha, "usaha");
    isiDropdown(allData, fieldMap.kreatif, "kreatif");
    isiDropdown(allData, fieldMap.visibilitas, "visibilitas");
    isiDropdown(allData, fieldMap.produksi, "produksi");
    isiDropdown(allData, fieldMap.distribusi, "distribusi");
    isiDropdown(allData, fieldMap.produk, "produk");
    isiDropdown(allData, fieldMap.sumber, "sumber");
    isiDropdown(allData, fieldMap.kesimpulan, "kesimpulan");
    isiDropdown(allData, fieldMap.cek, "cek");
    isiChartDropdown();
    updateSemua(allData);
  }
});

document.getElementById("searchBox").addEventListener("input", function(e){
  searchQuery = norm(e.target.value);
  applyFilter();
});

function isiChartDropdown(){

  let select = document.getElementById("chartSelector");
  select.innerHTML = "";

  Object.keys(fieldMap).forEach(key => {

    let fieldName = fieldMap[key];

    let opt = document.createElement("option");
    opt.value = fieldName;
    opt.text = fieldName;

    select.appendChild(opt);
  });

  select.value = "Usaha"; // default
}

function hitungDistribusi(data, field){
  let count = {};

  data.forEach(d => {
    let v = d[field] || "-";
    count[v] = (count[v] || 0) + 1;
  });

  return count;
}

function updateChartUtama(data){

  let field = document.getElementById("chartSelector").value;
  let type  = document.getElementById("chartType").value;

  let distribusi = hitungDistribusi(data, field);

  let labels = Object.keys(distribusi);
  let values = Object.values(distribusi);

  let ctx = document.getElementById("chartUtama").getContext("2d");

  if(chartUtama){
    chartUtama.destroy();
  }

  // opsional: tipe beda per field
 
  chartUtama = new Chart(ctx, {
    type: type,
    data: {
      labels: labels,
      datasets: [{
        label: field,
        data: values,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: type !== "bar" }
      }
    }
  });
}



function gantiLayer(){

  let pilihan = document.getElementById("layerSelect").value;
  let file = pilihan + ".geojson";

  if(geoLayer){ map.removeLayer(geoLayer); }

  fetch(file)
    .then(res => res.json())
    .then(data => {

      geoLayer = L.geoJSON(data, {
        style: { color:"purple", weight:1, fillOpacity:0.1 },

        onEachFeature: function(feature, layer){

          let p = feature.properties;
          let kec = p.nmkec || "-";
          let desa = p.nmdesa || "-";

          layer.bindPopup(`<b>Kecamatan:</b> ${kec}<br><b>Desa:</b> ${desa}`);

          layer.on("click", function(){

            document.querySelectorAll("select").forEach(s => s.value="all");

            let hasil = allData.filter(d =>
              norm(d.Kecamatan) === norm(kec) &&
              norm(d.Desa) === norm(desa)
            );

            filteredData = hasil;
            updateSemua(hasil);
          });

        }
      }).addTo(map);

      map.fitBounds(geoLayer.getBounds());
    });
}

function applyFilter(){

  let filters = [];

  Object.keys(fieldMap).forEach(id => {
    let val = document.getElementById(id).value;
    if(val !== "all") filters.push({field: fieldMap[id], val});
  });

  let filtered = allData.filter(d => {

    let matchFilter = filters.every(f =>
      norm(d[f.field]) === norm(f.val)
    );

    let matchSearch = searchQuery === "" ||
      norm(d.Nama).includes(searchQuery);

    return matchFilter && matchSearch;
  });

  filteredData = filtered;
  updateSemua(filtered);
}

function updateSemua(data){
  tampilkanMarker(data);
  tampilkanTabel(data);
  updateStat(data);
  updateChartUtama(data); // 🔥 penting
  document.getElementById("jumlah").innerText = data.length;
}
function tampilkanMarker(data) {
  usahaLayer.clearLayers();

  data.forEach(item => {

    let lat = parseFloat(item.Lat);
    let lng = parseFloat(item.Long);

    let wa = item["Hubungi"] || "";
    let maps = item["Maps"] || "";
    let cek = item["Cek"] || "-";
    let idsbr = item["IDSBR"] || "-";

    let waLink = wa
      ? `<a class="wa-btn" href="https://wa.me/${wa.replace(/[^0-9]/g,'')}" target="_blank">WA</a>`
      : "-";

    let mapLink = maps
      ? `<a class="map-btn" href="${maps}" target="_blank">📍</a>`
      : "-";

    let direction = maps
      ? `<a class="map-btn" href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}" target="_blank">➡️</a>`
      : "";

    let popup = `
      <b>${item.Nama}</b><br>
      ${item.Usaha}<br><br>
      ${item.Alamat}<br><br>
      ${item.Kecamatan}<br><br>
      ${item.Desa}<br><br>
      ${item.SLS}<br><br>

      <b>Cek:</b> ${cek}<br>
      <b>IDSBR:</b> ${idsbr}<br><br>

      ${waLink} ${mapLink} ${direction}
    `;

    let marker = L.circleMarker([lat, lng], {
      radius: 5,
      fillColor: "#0984e3",
      color: "#fff",
      weight: 1,
      fillOpacity: 0.9
    }).bindPopup(popup);
markerMap[item.Nama] = marker;
    usahaLayer.addLayer(marker);
  });
}

function tampilkanTabel(data){
  let tbody = document.getElementById("tabelData");
  tbody.innerHTML = "";

  data.forEach(d => {

    let wa = d["Hubungi"] || "";
    let maps = d["Maps"] || "";
    

    let cekIcon = cekFormat(d["Cek"]);

    let idsbrBadge = d["IDSBR"]
      ? `<span class="idsbr-badge">${d["IDSBR"]}</span>`
      : "-";

    let kes = (d["Kesimpulan"] || "").toLowerCase();

let warna = "#b2bec3"; // default abu

if (kes.includes("digital")) warna = "#00b894";        // hijau
else if (kes.includes("semi")) warna = "#fdcb6e";      // kuning
else if (kes.includes("konvensional")) warna = "#e17055"; // merah

let kesimpulan = d["Kesimpulan"]
  ? `<span style="
      background:${warna};
      color:white;
      padding:3px 6px;
      border-radius:6px;
      font-weight:bold;
      display:inline-block;
    ">${d["Kesimpulan"]}</span>`
  : "-";

    let row = document.createElement("tr");

    row.innerHTML = `
      <td>${d.Nama}</td>
      <td>${d.Usaha}</td>
      <td>${d.KBLI || "-"}</td>
      <td>${d.Alamat}</td>
      

      <td>${wa ? `<a class="wa-btn" href="https://wa.me/${wa.replace(/[^0-9]/g,'')}" target="_blank">WA</a>` : "-"}</td>
      <td>${maps ? `<a class="map-btn" href="${maps}" target="_blank">📍</a>` : "-"}</td>

      <td>${d.Kreatif || "-"}</td>
      <td>${d.Visibilitas || "-"}</td>
      <td>${d.Produksi || "-"}</td>
      <td>${d.Distribusi || "-"}</td>
      <td>${d.Produk || "-"}</td>
      <td>${d.Bangunan || "-"}</td>
      <td>${d.Input || "-"}</td>
      <td>${d.Person || "-"}</td>

      <td class="cek-icon">${cekIcon}</td>
      <td>${idsbrBadge}</td>
      <td>${iconMediaLink(d["Media"])}</td>
      <td>${kesimpulan}</td>
    `;

    row.onclick = () => {

  map.setView([d.Lat, d.Long], 17);

  let m = markerMap[d.Nama];

  if(m){
    m.openPopup();
  }
};
    tbody.appendChild(row);
  });
}

function iconMedia(val){
  if(!val) return "-";

  let v = val.toLowerCase();

  if(v.includes("youtube") || v.includes("youtu")) return "📺";
  if(v.includes("instagram") || v.includes("ig")) return "📷";
  if(v.includes("facebook") || v.includes("fb")) return "📘";
  if(v.includes("tiktok")) return "🎵";
  if(v.includes("whatsapp") || v.includes("wa")) return "💬";
  if(v.includes("website") || v.includes("http")) return "🌐";

  return "🔗";
}
function cekFormat(v){
  v = (v || "").toLowerCase().trim();

  if(v === "sudah") return "🟢Sudah";
  if(v === "belum") return "🔴Belum";
  if(v === "" || v === "-") return "⚪Kosong";

  return v;
}
function iconMediaLink(val){
  if(!val) return "-";

  let icon = iconMedia(val);

  if(icon === "🔗") return icon;

  return `<a href="${val}" target="_blank" style="text-decoration:none">${icon}</a>`;
}
function updateStat(data){

  document.getElementById("statTotal").innerText = data.length;

  // fungsi bantu hitung mode
  function mode(field){
    let count = {};
    data.forEach(d => {
      let v = d[field] || "-";
      count[v] = (count[v] || 0) + 1;
    });

    let maxKey = "-";
    let maxVal = 0;

    for(let k in count){
      if(count[k] > maxVal){
        maxVal = count[k];
        maxKey = k;
      }
    }

    return maxKey;
  }

  document.getElementById("statUsaha").innerText =
    mode("Usaha");

  document.getElementById("statKesimpulan").innerText =
    mode("Kesimpulan");

  document.getElementById("statKreatif").innerText =
    mode("Kreatif");
  document.getElementById("statCek").innerText =
    mode("Cek");
}
function resetFilter(){
  document.querySelectorAll("select").forEach(s => s.value="all");
  document.getElementById("searchBox").value = "";
  searchQuery = "";
  filteredData = allData;
  updateSemua(allData);
}

function isiDropdown(data, field, id){
  let set = new Set();
  data.forEach(d => { if(d[field]) set.add(d[field]); });

  let select = document.getElementById(id);

  set.forEach(val => {
    let opt = document.createElement("option");
    opt.value = val;
    opt.text = val;
    select.appendChild(opt);
  });
}
isiChartDropdown();
document.querySelectorAll("#usaha, #kreatif, #visibilitas, #produksi, #distribusi, #produk, #sumber, #kesimpulan, #cek")
  .forEach(s => {
    s.addEventListener("change", applyFilter);
});
document.getElementById("chartSelector")
  .addEventListener("change", function(){
    updateChartUtama(filteredData);
});

document.getElementById("chartType")
  .addEventListener("change", function(){
    updateChartUtama(filteredData);
});

gantiLayer();

</script>

</body>
</html>
