<!DOCTYPE html>
<html>
<head>
  <title>Web GIS Usaha Multi Layer</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:Arial; background:#f5f6fa; }
    header { background:#2f3640; color:white; padding:15px; font-size:20px; }

    .container { padding:15px; }

    .filter-box {
      background:white;
      padding:15px;
      border-radius:10px;
      margin-bottom:10px;
    }

    .filter-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      gap:10px;
    }

    select, button {
      padding:6px;
      border-radius:5px;
      border:1px solid #ccc;
    }

    button { background:#0984e3; color:white; cursor:pointer; }

    #map {
      height:400px;
      border-radius:10px;
      margin-bottom:10px;
    }

    table {
      width:100%;
      border-collapse:collapse;
      font-size:13px;
      background:white;
    }

    th, td {
      border:1px solid #ddd;
      padding:6px;
    }

    th { background:#0984e3; color:white; }

    tr:hover { background:#f1f1f1; cursor:pointer; }
  </style>
</head>
<body>

<header>📍 Web GIS Usaha Multi Layer</header>

<div class="container">

  <!-- FILTER -->
  <div class="filter-box">
    <div class="filter-grid">

      <select id="layerSelect" onchange="gantiLayer()">
        <option value="desa">Layer Desa</option>
        <option value="sls">Layer SLS</option>
        <option value="subsls">Layer Sub SLS</option>
      </select>

      <select id="usaha"><option value="all">Usaha</option></select>
      <select id="kreatif"><option value="all">Kreatif</option></select>
      <select id="visibilitas"><option value="all">Visibilitas</option></select>
      <select id="produksi"><option value="all">Produksi</option></select>
      <select id="distribusi"><option value="all">Distribusi</option></select>
      <select id="produk"><option value="all">Produk Final</option></select>
    </div>

    <br>
    <button onclick="resetFilter()">Reset</button>
    Jumlah data: <b id="jumlah">0</b>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>Nama</th>
        <th>Usaha</th>
        <th>KBLI</th>
        <th>Alamat</th>
      </tr>
    </thead>
    <tbody id="tabelData"></tbody>
  </table>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
// ================= MAP =================
var map = L.map('map').setView([-8.54,115.40], 12);
var usahaLayer = L.layerGroup().addTo(map);
var geoLayer;
let allData = [];
let filteredData = [];

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= FIELD =================
const fieldMap = {
  usaha: "Usaha",
  kreatif: "Kreatif",
  visibilitas: "Visibilitas",
  produksi: "Produksi",
  distribusi: "Distribusi",
  produk: "Produk final"
};

// ================= LOAD GOOGLE SHEET =================
Papa.parse("https://docs.google.com/spreadsheets/d/e/2PACX-1vTdCuzkPmo5X2upjTiZmE7JN98H4-1RL0XmT2AotLnBMBmyDPDJ4iKxDjQ6wnrTxSaEJhdIq6ieRVRP/pub?gid=0&single=true&output=csv", {
  download: true,
  header: true,
  complete: function(results) {

    allData = results.data.filter(d => d.Nama && d.Lat && d.Long);
    filteredData = allData;

    isiDropdown(allData, fieldMap.usaha, "usaha");
    isiDropdown(allData, fieldMap.kreatif, "kreatif");
    isiDropdown(allData, fieldMap.visibilitas, "visibilitas");
    isiDropdown(allData, fieldMap.produksi, "produksi");
    isiDropdown(allData, fieldMap.distribusi, "distribusi");
    isiDropdown(allData, fieldMap.produk, "produk");

    updateSemua(allData);
  }
});

// ================= LAYER SWITCH =================
function gantiLayer(){

  let pilihan = document.getElementById("layerSelect").value;
  let file = pilihan + ".geojson";

  if(geoLayer){
    map.removeLayer(geoLayer);
  }

  fetch(file)
    .then(res => res.json())
    .then(data => {

      geoLayer = L.geoJSON(data, {

        style: {
          color: "purple",
          weight: 1,
          fillOpacity: 0.1
        },

        onEachFeature: function(feature, layer){

          let p = feature.properties;

          let kec = p.nmkec || "-";
          let desa = p.nmdesa || "-";
          let sls = p.nmsls || "-";

          layer.bindPopup(`
            <b>Kecamatan:</b> ${kec}<br>
            <b>Desa:</b> ${desa}<br>
            <b>SLS:</b> ${sls}
          `);

          // 🔥 klik polygon → filter usaha
          layer.on("click", function(){

            let hasil = allData.filter(d =>
              d.Kecamatan === kec && d.Desa === desa
            );

            filteredData = hasil;
            updateSemua(hasil);
          });

          layer.on({
            mouseover: e => e.target.setStyle({weight:2,color:"orange"}),
            mouseout: e => geoLayer.resetStyle(e.target)
          });
        }

      }).addTo(map);

      map.fitBounds(geoLayer.getBounds());
    });
}

// ================= UPDATE =================
function updateSemua(data){
  tampilkanMarker(data);
  tampilkanTabel(data);
  document.getElementById("jumlah").innerText = data.length;
}

// ================= MARKER =================
function tampilkanMarker(data) {
  usahaLayer.clearLayers();

  data.forEach(item => {
    let marker = L.marker([
      parseFloat(item.Lat),
      parseFloat(item.Long)
    ])
    .bindPopup(`<b>${item.Nama}</b><br>${item.Usaha}`);

    usahaLayer.addLayer(marker);
  });
}

// ================= TABLE =================
function tampilkanTabel(data){
  let tbody = document.getElementById("tabelData");
  tbody.innerHTML = "";

  data.forEach(d => {
    let row = document.createElement("tr");

    row.innerHTML = `
      <td>${d.Nama}</td>
      <td>${d.Usaha}</td>
      <td>${d.KBLI || "-"}</td>
      <td>${d.Alamat}</td>
    `;

    row.onclick = () => map.setView([d.Lat, d.Long], 15);

    tbody.appendChild(row);
  });
}

// ================= FILTER =================
document.querySelectorAll("select").forEach(s => {
  s.addEventListener("change", applyFilter);
});

function applyFilter(){
  let usaha = document.getElementById("usaha").value;

  let filtered = allData.filter(d =>
    usaha === "all" || d[fieldMap.usaha] === usaha
  );

  filteredData = filtered;
  updateSemua(filtered);
}

// ================= RESET =================
function resetFilter(){
  document.querySelectorAll("select").forEach(s => s.value="all");
  filteredData = allData;
  updateSemua(allData);
}

// ================= DROPDOWN =================
function isiDropdown(data, field, id){
  let set = new Set();
  data.forEach(d => { if(d[field]) set.add(d[field]); });

  let select = document.getElementById(id);

  set.forEach(val => {
    let opt = document.createElement("option");
    opt.value = val;
    opt.text = val;
    select.appendChild(opt);
  });
}

// load default layer
gantiLayer();

</script>

</body>
</html>
